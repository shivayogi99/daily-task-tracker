<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 32px;
            width: 100%;
            max-width: 480px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 4px;
        }
        .date {
            font-size: 13px;
            color: #718096;
            margin-bottom: 24px;
        }
        .progress-bar {
            background: #e2e8f0;
            border-radius: 99px;
            height: 8px;
            margin-bottom: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 99px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 24px;
        }
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            transition: border-color 0.2s, background 0.2s;
        }
        .task-item.done {
            background: #f7fafc;
            border-color: #c6f6d5;
        }
        .task-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #667eea;
            cursor: pointer;
            flex-shrink: 0;
        }
        .task-text {
            flex: 1;
            font-size: 15px;
            color: #2d3748;
            outline: none;
            border: none;
            background: transparent;
            font-family: inherit;
        }
        .task-text.strikethrough {
            text-decoration: line-through;
            color: #a0aec0;
        }
        .task-text:focus {
            color: #1a202c;
        }
        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #cbd5e0;
            font-size: 18px;
            line-height: 1;
            padding: 0 4px;
            transition: color 0.2s;
        }
        .delete-btn:hover { color: #e53e3e; }
        .add-btn {
            width: 100%;
            padding: 12px;
            border: 1.5px dashed #cbd5e0;
            border-radius: 10px;
            background: none;
            color: #718096;
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            margin-bottom: 24px;
        }
        .add-btn:hover { border-color: #667eea; color: #667eea; }
        .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .footer {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-secondary {
            background: #edf2f7;
            color: #4a5568;
        }
        .congrats {
            display: none;
            text-align: center;
            padding: 16px;
            background: linear-gradient(135deg, #f6ffed, #d9f7be);
            border-radius: 10px;
            color: #276749;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 16px;
        }
        .congrats.show { display: block; }
    </style>
</head>
<body>
<div class="container">
    <h1>Daily Check-in</h1>
    <div class="date" id="dateDisplay"></div>

    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 of 5 tasks completed</div>

    <div class="congrats" id="congrats">All tasks done! Great work today!</div>

    <ul class="task-list" id="taskList"></ul>

    <button class="add-btn" id="addBtn" onclick="addTask()">+ Add task (max 5)</button>

    <div class="footer">
        <button class="btn btn-secondary" onclick="resetTasks()">Reset</button>
        <button class="btn btn-primary" onclick="saveCheckin()">Save Check-in</button>
    </div>
</div>

<script>
    const DEFAULT_TASKS = [
        { text: 'Morning workout', done: false },
        { text: 'Read for 20 minutes', done: false },
        { text: 'Review emails', done: false },
        { text: 'Drink 8 glasses of water', done: false },
        { text: 'Evening reflection', done: false },
    ];

    const today = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    document.getElementById('dateDisplay').textContent = today;

    function loadTasks() {
        const saved = localStorage.getItem('dailyTasks_' + new Date().toDateString());
        return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
    }

    function saveTasks(tasks) {
        localStorage.setItem('dailyTasks_' + new Date().toDateString(), JSON.stringify(tasks));
    }

    function renderTasks() {
        const tasks = loadTasks();
        const list = document.getElementById('taskList');
        list.innerHTML = '';

        tasks.forEach((task, i) => {
            const li = document.createElement('li');
            li.className = 'task-item' + (task.done ? ' done' : '');
            li.innerHTML = `
                <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${i})">
                <input class="task-text ${task.done ? 'strikethrough' : ''}" value="${task.text}"
                    onblur="renameTask(${i}, this.value)" onkeydown="if(event.key==='Enter')this.blur()">
                <button class="delete-btn" onclick="deleteTask(${i})" title="Remove">&#x2715;</button>
            `;
            list.appendChild(li);
        });

        const done = tasks.filter(t => t.done).length;
        const total = tasks.length;
        document.getElementById('progressFill').style.width = total ? (done / total * 100) + '%' : '0%';
        document.getElementById('progressLabel').textContent = `${done} of ${total} task${total !== 1 ? 's' : ''} completed`;
        document.getElementById('addBtn').disabled = total >= 5;
        document.getElementById('congrats').classList.toggle('show', done === total && total > 0);
    }

    function toggleTask(index) {
        const tasks = loadTasks();
        tasks[index].done = !tasks[index].done;
        saveTasks(tasks);
        renderTasks();
    }

    function renameTask(index, value) {
        const tasks = loadTasks();
        tasks[index].text = value.trim() || tasks[index].text;
        saveTasks(tasks);
        renderTasks();
    }

    function deleteTask(index) {
        const tasks = loadTasks();
        tasks.splice(index, 1);
        saveTasks(tasks);
        renderTasks();
    }

    function addTask() {
        const tasks = loadTasks();
        if (tasks.length >= 5) return;
        tasks.push({ text: 'New task', done: false });
        saveTasks(tasks);
        renderTasks();
        const inputs = document.querySelectorAll('.task-text');
        const last = inputs[inputs.length - 1];
        last.focus();
        last.select();
    }

    function resetTasks() {
        if (confirm('Reset all tasks for today?')) {
            saveTasks(JSON.parse(JSON.stringify(DEFAULT_TASKS)));
            renderTasks();
        }
    }

    function saveCheckin() {
        const tasks = loadTasks();
        const done = tasks.filter(t => t.done).length;
        alert(`Check-in saved!\n${done} of ${tasks.length} tasks completed today.`);
    }

    renderTasks();
</script>
</body>
</html>
