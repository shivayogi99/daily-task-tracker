<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐ My Daily Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(160deg, #a855f7 0%, #6366f1 50%, #3b82f6 100%);
            min-height: 100vh;
            padding: 24px 16px 60px;
        }

        .container { max-width: 480px; margin: 0 auto; }

        /* ── Header ── */
        .header { text-align: center; padding: 8px 0 16px; color: white; }
        .header h1 { font-size: 30px; font-weight: 900; letter-spacing: -0.5px; text-shadow: 0 2px 12px rgba(0,0,0,0.2); }

        .date-nav {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-top: 10px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.25); border: none; color: white;
            width: 34px; height: 34px; border-radius: 50%; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; font-weight: 900; line-height: 1;
        }
        .nav-btn:hover  { background: rgba(255,255,255,0.4); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .date-label {
            font-size: 13px; font-weight: 800; opacity: 0.95;
            min-width: 200px; text-align: center;
        }

        .past-banner {
            background: rgba(255,255,255,0.18); border-radius: 12px;
            padding: 8px 14px; text-align: center; color: white;
            font-size: 13px; font-weight: 700; margin-bottom: 14px;
        }

        /* ── Points card ── */
        .points-card {
            background: white; border-radius: 24px;
            padding: 22px 22px 18px; text-align: center;
            margin-bottom: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        .points-row { display: flex; align-items: flex-end; justify-content: center; gap: 6px; }
        .points-big { font-size: 56px; font-weight: 900; color: #7c3aed; line-height: 1; }
        .points-max { font-size: 20px; font-weight: 700; color: #a78bfa; padding-bottom: 8px; }
        .points-label { font-size: 13px; color: #9ca3af; font-weight: 700; margin-top: 2px; }
        .progress-wrap { background: #f3f4f6; border-radius: 99px; height: 14px; margin: 14px 0 10px; overflow: hidden; }
        .progress-fill {
            height: 100%; border-radius: 99px;
            background: linear-gradient(90deg, #a855f7, #6366f1);
            transition: width 0.5s cubic-bezier(.4,0,.2,1);
        }
        .badges-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
        .badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 99px; padding: 5px 12px; font-size: 13px; font-weight: 800; }
        .badge-streak { background: #fff7ed; color: #ea580c; }
        .badge-level  { background: #f0fdf4; color: #16a34a; }

        /* ── Encouragement ── */
        .encouragement {
            background: white; border-radius: 16px; padding: 14px 18px;
            margin-bottom: 14px; text-align: center; font-size: 15px;
            font-weight: 800; color: #4b5563;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1); line-height: 1.4;
        }

        /* ── Tasks ── */
        .section-label {
            color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 800;
            letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;
        }

        .task-card {
            background: white; border-radius: 18px; padding: 16px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1); cursor: pointer;
            transition: transform 0.12s, opacity 0.12s; border: 2.5px solid transparent;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .task-card:active { transform: scale(0.97); }
        .task-card.done { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-color: #86efac; }

        .task-emoji { font-size: 38px; width: 52px; text-align: center; flex-shrink: 0; }
        .task-info { flex: 1; }
        .task-name { font-size: 16px; font-weight: 800; color: #1f2937; }
        .task-card.done .task-name { color: #166534; text-decoration: line-through; opacity: 0.75; }
        .task-pts-label { font-size: 13px; color: #9ca3af; font-weight: 700; margin-top: 3px; }
        .task-card.done .task-pts-label { color: #22c55e; }

        .task-check {
            width: 36px; height: 36px; border-radius: 50%; border: 3px solid #d1d5db;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0; color: white;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }
        .task-card.done .task-check { background: #22c55e; border-color: #22c55e; transform: scale(1.1); }

        /* ── Stat cards ── */
        .stat-card { background: white; border-radius: 22px; padding: 20px; margin-top: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .stat-title { font-size: 16px; font-weight: 800; color: #1f2937; margin-bottom: 16px; }

        .week-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
        .week-box { background: #faf5ff; border-radius: 14px; padding: 14px; text-align: center; }
        .week-box .wval { font-size: 30px; font-weight: 900; color: #7c3aed; }
        .week-box .wlbl { font-size: 12px; color: #9ca3af; font-weight: 700; margin-top: 2px; }

        .change-pill { text-align: center; font-size: 14px; font-weight: 800; padding: 10px 16px; border-radius: 12px; }
        .change-up   { background: #f0fdf4; color: #16a34a; }
        .change-down { background: #fff1f2; color: #e11d48; }
        .change-same { background: #faf5ff; color: #7c3aed; }

        /* ── Spinner ── */
        .spinner { display: flex; justify-content: center; align-items: center; padding: 40px; color: white; font-size: 16px; font-weight: 700; gap: 12px; }
        .spin { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Task toast ── */
        .toast {
            position: fixed; top: 24px; left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: white; border-radius: 20px;
            padding: 14px 22px; box-shadow: 0 10px 40px rgba(0,0,0,0.22);
            z-index: 3000; display: flex; align-items: center; gap: 10px;
            font-size: 17px; font-weight: 800; color: #1f2937;
            white-space: nowrap; pointer-events: none;
            transition: transform 0.45s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
            opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.hide { transform: translateX(-50%) translateY(-120px); opacity: 0; transition: transform 0.3s ease-in, opacity 0.3s; }

        /* ── Celebration overlay ── */
        .celebration-overlay {
            position: fixed; inset: 0; z-index: 2500;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
            opacity: 0; transition: opacity 0.4s;
            pointer-events: none;
        }
        .celebration-overlay.show { opacity: 1; pointer-events: auto; }
        .celebration-box {
            background: white; border-radius: 32px; padding: 40px 32px;
            text-align: center; max-width: 300px; width: 90%;
            transform: scale(0.5); transition: transform 0.5s cubic-bezier(.34,1.56,.64,1);
        }
        .celebration-overlay.show .celebration-box { transform: scale(1); }
        .celebration-emoji { font-size: 64px; line-height: 1; margin-bottom: 12px; }
        .celebration-title { font-size: 26px; font-weight: 900; color: #7c3aed; margin-bottom: 8px; line-height: 1.2; }
        .celebration-sub { font-size: 15px; font-weight: 700; color: #6b7280; margin-bottom: 24px; }
        .celebration-pts { font-size: 36px; font-weight: 900; color: #22c55e; margin-bottom: 6px; }
        .celebration-pts-label { font-size: 13px; color: #9ca3af; font-weight: 700; margin-bottom: 24px; }
        .celebration-close {
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: white; border: none; border-radius: 14px;
            padding: 13px 32px; font-size: 16px; font-weight: 800;
            cursor: pointer; font-family: 'Nunito', sans-serif;
        }

        /* ── Fireworks canvas ── */
        #fireworksCanvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 2400; pointer-events: none; }

        /* ── Confetti ── */
        @keyframes confetti-fall {
            0%   { transform: translateY(-30px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(800deg); opacity: 0; }
        }
        .confetti-bit { position: fixed; pointer-events: none; z-index: 9999; animation: confetti-fall linear forwards; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>⭐ My Daily Stars</h1>
        <div class="date-nav">
            <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">‹</button>
            <div class="date-label" id="dateDisplay">—</div>
            <button class="nav-btn" id="nextBtn" onclick="navigate(1)" disabled>›</button>
        </div>
    </div>

    <div id="appContent">
        <div class="spinner"><div class="spin"></div> Loading your stars…</div>
    </div>

</div>

<script>
// ── Config ───────────────────────────────────────────────────
const SUPABASE_URL = 'https://hjhvwtrdbjsfxyttcsfd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_doyTc_8mPlV5wG1CuwhPRQ_pnzkQCuu';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TASKS = [
    { id: 'bestbrains',  label: 'Bestbrains',          emoji: '🧠', points: 30 },
    { id: 'homework',    label: 'School Homework',     emoji: '📚', points: 25 },
    { id: 'brushnight',  label: 'Brushed at Night',    emoji: '🪥', points: 20 },
    { id: 'eatownown',   label: 'Eat on My Own',       emoji: '🍽️', points: 20 },
];

const MAX = TASKS.reduce((s, t) => s + t.points, 0);

const MESSAGES = [
    "You've got this! Tap a task to get started! 💪",
    "Amazing start! Keep going, superstar! 🌟",
    "You're crushing it! Halfway there! 🎉",
    "SO CLOSE! Just one more to go! 🚀",
    "🏆 YOU DID IT ALL! You're absolutely incredible! 🌈✨🎊",
];

const LEVELS = [
    { min: 95, label: '👑 Champion!'     },
    { min: 71, label: '🏆 Superstar!'    },
    { min: 47, label: '🎉 Great job!'    },
    { min: 23, label: '🌟 Good start!'   },
    { min:  0, label: '🌱 Just starting' },
];

// ── Date helpers ─────────────────────────────────────────────
function dateKey(date = new Date()) {
    return date.toISOString().split('T')[0];
}

function addDays(key, n) {
    const d = new Date(key + 'T12:00:00');
    d.setDate(d.getDate() + n);
    return dateKey(d);
}

const TODAY = dateKey();
let selectedDate = TODAY;

// ── Cache (last 30 days) ─────────────────────────────────────
let cache = [];

function isDone(date, taskId) {
    return cache.some(r => r.date === date && r.task_id === taskId);
}

function dayPoints(date) {
    return TASKS.filter(t => isDone(date, t.id)).reduce((s, t) => s + t.points, 0);
}

async function loadCache() {
    const start = addDays(TODAY, -29);
    const { data } = await db.from('task_completions')
        .select('date, task_id')
        .eq('done', true)
        .gte('date', start)
        .lte('date', TODAY);
    cache = data || [];
}

// ── Navigation ───────────────────────────────────────────────
function navigate(offset) {
    const next = addDays(selectedDate, offset);
    if (next > TODAY) return;
    if (next < addDays(TODAY, -29)) return;
    selectedDate = next;
    updateDateDisplay();
    renderTasks();
    updateHeader();
}

function updateDateDisplay() {
    const isToday     = selectedDate === TODAY;
    const isYesterday = selectedDate === addDays(TODAY, -1);
    const d = new Date(selectedDate + 'T12:00:00');
    const formatted = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

    let label = formatted;
    if (isToday)     label = 'Today — ' + formatted;
    if (isYesterday) label = 'Yesterday — ' + formatted;

    document.getElementById('dateDisplay').textContent = label;
    document.getElementById('nextBtn').disabled = isToday;

    const banner = document.getElementById('pastBanner');
    if (banner) banner.style.display = isToday ? 'none' : 'block';
    if (banner && !isToday) banner.textContent = '✏️ Editing a past day — changes will be saved';
}

// ── Toggle ───────────────────────────────────────────────────
async function toggle(taskId) {
    const date   = selectedDate;
    const done   = isDone(date, taskId);
    const newVal = !done;
    const task   = TASKS.find(t => t.id === taskId);

    if (newVal) {
        cache.push({ date, task_id: taskId });
    } else {
        cache = cache.filter(r => !(r.date === date && r.task_id === taskId));
    }

    const isAll = TASKS.every(t => isDone(date, t.id));

    if (newVal) {
        if (isAll) {
            showCelebration(dayPoints(date));
        } else {
            showToast(task);
        }
    }

    renderTasks();
    updateHeader();
    refreshChart();
    refreshWeek();

    await db.from('task_completions')
        .upsert({ date, task_id: taskId, done: newVal }, { onConflict: 'date,task_id' });
}

// ── Render tasks ─────────────────────────────────────────────
function renderTasks() {
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    TASKS.forEach(task => {
        const done = isDone(selectedDate, task.id);
        const card = document.createElement('div');
        card.className = 'task-card' + (done ? ' done' : '');
        card.innerHTML = `
            <div class="task-emoji">${task.emoji}</div>
            <div class="task-info">
                <div class="task-name">${task.label}</div>
                <div class="task-pts-label">${done ? '✅ +' + task.points + ' stars earned!' : '⭐ Worth ' + task.points + ' stars'}</div>
            </div>
            <div class="task-check">${done ? '✓' : ''}</div>
        `;
        card.onclick = () => toggle(task.id);
        list.appendChild(card);
    });
}

function updateHeader() {
    const done  = TASKS.filter(t => isDone(selectedDate, t.id)).length;
    const pts   = dayPoints(selectedDate);
    const level = LEVELS.find(l => pts >= l.min);

    document.getElementById('pointsToday').textContent  = pts;
    document.getElementById('progressFill').style.width = (pts / MAX * 100) + '%';
    document.getElementById('encouragement').textContent = MESSAGES[done];
    document.getElementById('streakBadge').textContent  = '🔥 ' + calcStreak() + ' day streak';
    document.getElementById('levelBadge').textContent   = level.label;
}

function calcStreak() {
    let n = 0;
    for (let i = 0; i < 30; i++) {
        if (dayPoints(addDays(TODAY, -i)) === MAX) n++;
        else break;
    }
    return n;
}

// ── Chart ────────────────────────────────────────────────────
let chart;

function last7() {
    return Array.from({ length: 7 }, (_, i) => {
        const date = addDays(TODAY, -(6 - i));
        const d    = new Date(date + 'T12:00:00');
        return {
            label: i === 6 ? 'Today' : d.toLocaleDateString('en-US', { weekday: 'short' }),
            points: dayPoints(date),
            isSelected: date === selectedDate,
        };
    });
}

function barColor(pts, isSelected) {
    if (isSelected)     return '#f59e0b';
    if (pts === 0)      return '#e5e7eb';
    if (pts >= MAX)     return '#22c55e';
    if (pts / MAX >= .5) return '#818cf8';
    return '#f87171';
}

function buildChart() {
    const days = last7();
    chart = new Chart(document.getElementById('weekChart').getContext('2d'), {
        type: 'bar',
        data: {
            labels: days.map(d => d.label),
            datasets: [{
                data: days.map(d => d.points),
                backgroundColor: days.map(d => barColor(d.points, d.isSelected)),
                borderRadius: 8,
                borderSkipped: false,
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: c => c.raw + ' / ' + MAX + ' ⭐' } }
            },
            scales: {
                y: {
                    min: 0, max: MAX,
                    ticks: { font: { family: 'Nunito', weight: '700' }, stepSize: 19 },
                    grid: { color: '#f3f4f6' },
                },
                x: {
                    ticks: { font: { family: 'Nunito', weight: '700' } },
                    grid: { display: false },
                }
            }
        }
    });
}

function refreshChart() {
    const days = last7();
    chart.data.datasets[0].data            = days.map(d => d.points);
    chart.data.datasets[0].backgroundColor = days.map(d => barColor(d.points, d.isSelected));
    chart.update();
}

// ── Week stats ───────────────────────────────────────────────
function weekPts(offset = 0) {
    const now = new Date();
    const mon = new Date(now);
    mon.setDate(now.getDate() - ((now.getDay() + 6) % 7) - offset * 7);
    let total = 0;
    for (let i = 0; i < 7; i++) {
        const d = new Date(mon); d.setDate(mon.getDate() + i);
        if (offset === 0 && d > now) break;
        total += dayPoints(dateKey(d));
    }
    return total;
}

function refreshWeek() {
    const tw = weekPts(0), lw = weekPts(1);
    document.getElementById('thisWeekPts').textContent = tw;
    document.getElementById('lastWeekPts').textContent = lw;

    const el = document.getElementById('weekChange');
    if (lw === 0) {
        el.className = 'change-pill change-same';
        el.textContent = '📊 Keep going this week!';
    } else if (tw > lw) {
        el.className = 'change-pill change-up';
        el.textContent = `🚀 Up ${Math.round((tw - lw) / lw * 100)}% vs last week — awesome!`;
    } else if (tw < lw) {
        el.className = 'change-pill change-down';
        el.textContent = `💪 Down ${Math.round((lw - tw) / lw * 100)}% — you can beat last week!`;
    } else {
        el.className = 'change-pill change-same';
        el.textContent = '⭐ Same as last week — keep it up!';
    }
}

// ── Audio engine ─────────────────────────────────────────────
let audioCtx = null;
function audio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function osc(ctx, freq, start, dur, type = 'sine', vol = 0.25, freqEnd = null) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, start);
    if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, start + dur);
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.start(start); o.stop(start + dur + 0.05);
}

function noise(ctx, start, dur, vol = 0.12, freqFrom = 150, freqTo = 2500) {
    const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    const flt = ctx.createBiquadFilter();
    const g   = ctx.createGain();
    src.buffer = buf;
    flt.type = 'bandpass'; flt.Q.value = 0.8;
    flt.frequency.setValueAtTime(freqFrom, start);
    flt.frequency.exponentialRampToValueAtTime(freqTo, start + dur);
    src.connect(flt); flt.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    src.start(start); src.stop(start + dur + 0.05);
}

// ✨ Single task: ascending sparkle power-up ✨
function playTaskSound() {
    const ctx = audio();
    const t   = ctx.currentTime + 0.04;

    // Bright ascending arpeggio
    [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((f, i) => {
        osc(ctx, f, t + i * 0.09, 0.35 - i * 0.03, 'sine', 0.28);
        osc(ctx, f * 2, t + i * 0.09, 0.18, 'sine', 0.07);  // harmonic shimmer
    });

    // Sparkle sprinkle (random high tinkles)
    const highs = [1047, 1175, 1319, 1480, 1568, 1760, 2093, 2349];
    for (let i = 0; i < 8; i++) {
        osc(ctx, highs[Math.floor(Math.random() * highs.length)],
            t + 0.05 + Math.random() * 0.55, 0.18, 'sine', 0.06);
    }
}

// 🎆 All tasks done: EPIC victory fanfare 🎆
function playCelebrationSound() {
    const ctx = audio();
    const t   = ctx.currentTime + 0.04;

    // ── Drum roll buildup ──
    for (let i = 0; i < 14; i++) {
        noise(ctx, t + i * 0.055, 0.09, 0.07 + i * 0.007, 80, 300);
    }

    // ── Brass punch ──
    [261.63, 329.63, 392.00, 523.25].forEach(f => {
        osc(ctx, f, t + 0.78, 0.55, 'sawtooth', 0.10);
        osc(ctx, f, t + 0.78, 0.55, 'square',   0.04);
    });

    // ── Ascending victory melody ──
    const mel = [
        [523.25, 1.4, 0.13], [587.33, 1.53, 0.13],
        [659.25, 1.66, 0.13], [698.46, 1.79, 0.10],
        [783.99, 1.89, 0.18], [880.00, 2.07, 0.13],
        [987.77, 2.20, 0.13], [1046.5, 2.33, 0.65],
    ];
    mel.forEach(([f, time, dur]) => {
        osc(ctx, f, t + time, dur, 'sine',     0.30);
        osc(ctx, f, t + time, dur, 'triangle', 0.10);
    });

    // ── Big final chord ──
    [523.25, 659.25, 783.99, 1046.5].forEach(f => {
        osc(ctx, f, t + 3.05, 1.4, 'sine',     0.20);
        osc(ctx, f, t + 3.05, 1.4, 'triangle', 0.07);
    });
    // Bell shimmer on top
    [2093, 2637, 3136].forEach((f, i) => {
        osc(ctx, f, t + 3.05 + i * 0.08, 1.1, 'sine', 0.055);
    });
    // Final snare crack
    noise(ctx, t + 3.05, 0.25, 0.22, 200, 8000);

    // ── Outro sparkle ──
    for (let i = 0; i < 10; i++) {
        const sp = [1047, 1319, 1568, 2093, 2637];
        osc(ctx, sp[Math.floor(Math.random() * sp.length)],
            t + 3.3 + Math.random() * 1.0, 0.25, 'sine', 0.05);
    }
}

// ── Fireworks ─────────────────────────────────────────────────
function launchFireworks(duration = 4500) {
    const canvas = document.createElement('canvas');
    canvas.id = 'fireworksCanvas';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    const particles = [];
    const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c44dff','#ff6b9d','#f97316','#a855f7'];

    function burst(x, y) {
        for (let i = 0; i < 70; i++) {
            const angle = (i / 70) * Math.PI * 2;
            const speed = 2 + Math.random() * 6;
            particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 1,
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                alpha: 1,
                size: 2.5 + Math.random() * 3.5,
                gravity: 0.08 + Math.random() * 0.08,
                trail: [],
            });
        }
    }

    burst(canvas.width * 0.5, canvas.height * 0.3);
    let launched = 1;
    const launchInterval = setInterval(() => {
        burst(canvas.width * (0.15 + Math.random() * 0.7), canvas.height * (0.1 + Math.random() * 0.45));
        launched++;
        if (launched >= 7) clearInterval(launchInterval);
    }, 550);

    let raf;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.trail.push({ x: p.x, y: p.y });
            if (p.trail.length > 5) p.trail.shift();
            p.x  += p.vx;
            p.y  += p.vy;
            p.vy += p.gravity;
            p.vx *= 0.97;
            p.alpha -= 0.014;
            if (p.alpha <= 0) { particles.splice(i, 1); continue; }
            p.trail.forEach((pt, ti) => {
                ctx.globalAlpha = (ti / p.trail.length) * p.alpha * 0.4;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, p.size * 0.6, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        if (particles.length > 0) raf = requestAnimationFrame(draw);
        else canvas.remove();
    }
    draw();
    setTimeout(() => { cancelAnimationFrame(raf); canvas.remove(); }, duration + 1000);
}
